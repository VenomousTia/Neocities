    <style>
        .marquee {
            position: relative;
            background-color: var(--main);
            border: 1px var(--divider) dotted;
            width: auto;
            height: 40px;
            overflow: hidden;
            padding: 4px;
            bottom: 8px;
            border-radius: 10px;
        }

        .scroll {
            display: block;
            position: absolute;
            white-space: nowrap;
            /* edit the time variable inline. Make sure to include the unit (such as s for seconds) in the inline as well.*/
            animation: scroll var(--time) linear infinite;
        }
        /* When hovered with a mouse, the scroll will pause movement. This is optional*/
        .scroll:hover {
            animation-play-state: paused;
        }
        .scroll img{
            max-height: 31px;
            width: auto;
        }

        /* To ensure smooth scrolling, you need to edit the values as best fits, IN you inline scroll (aka not here in the css sheet).
        To make it easier have a temporary, unique 'start' and 'end' item.
        Use the 'end' item to track when the animation restarts into 'start'.*/
        @keyframes scroll {
            from { transform: translateX(var(--from-width)); }
            to { transform: translateX(var(--to-width)); }
        }
    </style>
</head>
